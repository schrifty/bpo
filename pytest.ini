[pytest]
filterwarnings =
    # google-* emits these when the interpreter is 3.9; noisy in every test that imports the stack.
    ignore:You are using a Python version 3.9 past its end of life.*:FutureWarning
    ignore:You are using a non-supported Python version.*:FutureWarning
markers =
    slow: long-running (integration, heavy I/O, full QBR/rollup paths). Excluded with: pytest -m "not slow"
    leandna_data_api: live HTTP to LeanDNA Data API when credentials are in .env (see tests/test_integration_leandna_data_api.py; metric display: tests/test-metrics.py)
    jira_live: live read-only HTTP to Jira via Atlassian API gateway when JIRA_* credentials are in .env (see tests/test_integration_jira.py)
pythonpath = .
testpaths = tests
python_files = test_*.py *_test.py *_tests.py test-*.py
