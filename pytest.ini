[pytest]
markers =
    slow: long-running (integration, heavy I/O, full QBR/rollup paths). Excluded with: pytest -m "not slow"
    leandna_data_api: live HTTP to LeanDNA Data API; requires BPO_LEANDNA_DATA_API_INTEGRATION=1 and credentials (see tests/test_integration_leandna_data_api.py)
pythonpath = .
testpaths = tests
