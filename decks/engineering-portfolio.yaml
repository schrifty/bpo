id: engineering-portfolio
name: Engineering Portfolio Review
audience: VP / Director of Engineering

purpose: |
  A product-level engineering review — not per customer, but across the entire
  LEAN project. Covers what's in flight this sprint, bug health, weekly velocity,
  and the aggregate support burden coming in from customers.

  The narrative arc: "Here's what the team is working on, how fast we're shipping,
  where the bugs are, and how much unplanned support work is competing for
  engineering capacity."

