id: support_review_portfolio
name: Support Review — Portfolio
audience: Support / Engineering Leadership

purpose: |
  Installed-base (all-customers) support operations deck: same Jira-backed
  slide lineup as ``support`` when run with no customer — HELP / CUSTOMER /
  LEAN volume, KPIs, org ranking on HELP, escalation metrics, customer
  escalations, recent activity, and resolved-by-assignee tables.
  Use this deck id when you want an explicit portfolio artifact (title and
  ``decks --list``) distinct from per-account ``support`` runs. Not added to
  the QBR companion deck list unless product asks for it.

# Slide order matches ``decks/support.yaml`` (shared slide YAML ids).
slides:
  - slide: support_deck_cover
    title: Support Review — Portfolio
  - slide: support_notable
    title: Notable
  - slide: eng_help_volume_trends
    title: "HELP Ticket Volume Trends"
  - slide: customer_ticket_metrics
    title: "HELP Ticket Metrics"
  - slide: support_ticket_metrics_breakdown
    title: "HELP Ticket Metrics Breakdown"
  - slide: support_help_orgs_by_opened
    title: "HELP — Tickets Opened by Organization (90 Days)"
  - slide: support_help_escalation_metrics
    title: "HELP — Escalation metrics"
  - slide: support_help_customer_escalations
    title: "Customer Escalations (HELP)"
  - slide: support_recent_opened
    title: "Recently opened HELP tickets"
  - slide: support_recent_closed
    title: "Recently closed HELP tickets"
  - slide: help_resolved_by_assignee
    title: "HELP Tickets Resolved by Assignee (Last 90 Days)"
  - slide: customer_project_volume_trends
    title: "CUSTOMER Ticket Volume Trends"
  - slide: customer_project_ticket_metrics
    title: "CUSTOMER Ticket Metrics"
  - slide: customer_project_ticket_metrics_breakdown
