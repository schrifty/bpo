id: support
name: Support Review
audience: Support / Engineering Leadership

purpose: |
  A focused support deck for operational ticket-volume review.
  Three parallel blocks — HELP, CUSTOMER, and LEAN — each with the same six
  slides: volume trends, KPI ticket metrics, open-ticket breakdown (pies),
  recently opened, recently closed, and resolved by assignee (90 days).
  Customer scoping matches organization/text search per project (all-customers
  runs use full project scope where applicable).

slides:
