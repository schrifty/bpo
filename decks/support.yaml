id: support
name: Support Review
audience: Support / Engineering Leadership

purpose: |
  A focused support deck for operational ticket-volume review.
  Starts with the HELP created-vs-resolved trend so the team can isolate
  backlog pressure and escalations without mixing it into the broader
  engineering portfolio narrative. Adds per-customer KPIs, then recent opened
  and recent closed ticket lists for HELP, CUSTOMER, and LEAN projects (same customer match as metrics).
  Includes resolved tickets by assignee for HELP and CUSTOMER projects (last 90 days).

slides:
  - slide: eng_help_volume_trends
    title: "HELP Ticket Volume Trends"
  - slide: customer_ticket_metrics
    title: "Safran Electronics & Defense (SED) Ticket Metrics"
  - slide: support_recent_opened
    title: "Recently opened HELP tickets (SED)"
  - slide: support_recent_closed
    title: "Recently closed HELP tickets (SED)"
  - slide: help_resolved_by_assignee
    title: "HELP Tickets Resolved by Assignee (Last 90 Days)"
  - slide: customer_project_recent_opened
    title: "Recently opened CUSTOMER tickets (SED)"
  - slide: customer_project_recent_closed
    title: "Recently closed CUSTOMER tickets (SED)"
  - slide: customer_resolved_by_assignee
    title: "CUSTOMER Tickets Resolved by Assignee (Last 90 Days)"
  - slide: lean_project_recent_opened
    title: "Recently opened LEAN tickets (SED)"
  - slide: lean_project_recent_closed
    title: "Recently closed LEAN tickets (SED)"
