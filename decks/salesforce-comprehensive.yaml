id: salesforce_comprehensive
name: Salesforce Comprehensive Export
audience: Customer Success / RevOps

purpose: |
  Internal-first deck: one slide per mainstream Salesforce object category for
  the matched Customer Entity account(s) and their descendant accounts (standard
  Account ParentId hierarchy). Row counts are capped per query; empty categories
  are omitted (no blank table slides). Trim or split decks once you know which
  views matter for each customer.

