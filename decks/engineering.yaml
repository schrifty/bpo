id: engineering
name: Engineering Review
audience: Engineering / Product

purpose: |
  This deck is for engineering and product leaders who need a quick read on
  per-customer support burden, SLA performance, pipeline health, and enhancement
  requests. The narrative arc is: "Here's what each customer is experiencing in
  support, how well we're responding, what we're actively building for them, and
  what they've asked for next."

  The audience cares about specifics — ticket counts, breach rates, open bugs,
  and pipeline items — not high-level sentiment. Every slide should give an
  engineering leader something actionable: a customer to prioritize, an SLA risk
  to address, or a pipeline item to communicate back.

# Slide YAML: slides/eng-review-01-title.yaml … eng-review-07-data-quality.yaml (ids eng_review_*).

slides:
  - slide: eng_review_title
  - slide: eng_review_support_breakdown
  - slide: eng_review_sla_health
  - slide: eng_review_jira
  - slide: eng_review_engineering
  - slide: eng_review_enhancements
  - slide: eng_review_data_quality

overrides:
  - slide: eng_review_support_breakdown
    require: true
    note: Core of the engineering deck — always show even if data is sparse.
  - slide: eng_review_sla_health
    require: true
    note: Always show SLA health so engineers can see breach rates.
