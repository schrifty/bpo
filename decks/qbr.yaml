id: qbr
name: Quarterly Business Review
audience: Customer Success — QBR meetings

purpose: |
  A branded QBR deck that replicates the slide style CSMs have been building
  manually. Opens with a branded cover and auto-generated agenda, uses section
  dividers between major topics, and fills data slides with live Pendo, Jira,
  and CS Report data.

# Slide configs on disk (slides/*.yaml), QBR deck order: qbr-01-cover … qbr-18-data-quality.
# Template slides use ids qbr_cover, qbr_agenda, qbr_divider, qbr_deployment; metric slides share ids like health, signals (other decks reuse those files).

slides:
  - slide: qbr_cover
  - slide: qbr_agenda
  - slide: qbr_divider
    title: Current deployment coverage
  - slide: qbr_deployment
  - slide: qbr_divider
    title: Usage & engagement
  - slide: health
  - slide: engagement
  - slide: pendo_localization
  - slide: sites
  - slide: features
  - slide: pendo_friction
  - slide: depth
  - slide: pendo_sentiment
  - slide: qbr_divider
    title: Support & engineering
  - slide: jira
  - slide: sla_health
  - slide: engineering
  - slide: enhancements
  - slide: qbr_divider
    title: Platform health & value
  - slide: platform_health
  - slide: supply_chain
  - slide: shortage_forecast
  - slide: critical_shortages_detail
  - slide: shortage_deliveries
  - slide: lean_projects_savings
  - slide: lean_projects_portfolio
  - slide: platform_value
  - slide: qbr_divider
    title: Summary & next steps
  - slide: signals
  - slide: pendo_definitions_appendix
  - slide: data_quality

overrides:
  - slide: health
    require: true
  - slide: signals
    require: true
