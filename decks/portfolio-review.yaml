id: portfolio_review
name: 00 - Book of Business Review
audience: CS Leadership, VP Customer Success, CRO
purpose: >
  A portfolio-level view of the entire customer base. Instead of
  diving into a single account, this deck answers: where are the
  fires, what systemic trends should we act on, and who are our
  strongest customers? The narrative arc moves from urgency (signals)
  to patterns (trends) to bright spots (leaders). With Salesforce
  ARR data, every signal and ranking gains revenue context — making
  this the primary input for QBR prep, renewal forecasting, and
  resource allocation decisions.

slides:
  - slide: portfolio_title
  - slide: portfolio_signals
  - slide: portfolio_trends
  - slide: portfolio_leaders
  - slide: data_quality

overrides:
  - slide: portfolio_signals
    require: true
    note: The most actionable slide — never skip it.
  - slide: portfolio_leaders
    require: true
    note: Bright spots anchor the narrative with positivity.
