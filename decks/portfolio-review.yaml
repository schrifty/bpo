id: portfolio_review
name: Portfolio Health Review
audience: CS Leadership, VP Customer Success, CRO
purpose: >
  A portfolio-level health view of the installed base. Instead of
  diving into a single account, this deck answers: where are the
  fires, what systemic trends should we act on, and who are our
  strongest customers? Opens with a Salesforce revenue book (ARR,
  pipeline, churned vs active), then expansion / new-logo closed-won KPIs,
  then moves through urgency (signals),
  patterns (trends), and bright spots (leaders). With Salesforce
  ARR data, signals and rankings gain revenue context for
  prioritization — supporting QBR prep, renewal conversations, and
  resource allocation.

slides:
  - slide: portfolio_title
  - slide: portfolio_revenue_book
  - slide: portfolio_expansion_book
  - slide: portfolio_signals
  - slide: portfolio_trends
  - slide: portfolio_leaders
  - slide: data_quality

overrides:
  - slide: portfolio_signals
    require: true
    note: The most actionable slide — never skip it.
  - slide: portfolio_leaders
    require: true
    note: Bright spots anchor the narrative with positivity.
