id: cohort_review
name: Manufacturing cohort review
audience: CS Leadership, Strategy

purpose: |
  Cross-customer view grouped by manufacturing cohort as defined in cohorts.yaml
  (documented in docs/CUSTOMER_COHORTS.md). After the portfolio summary, one slide
  states notable cohort differences; then up to ten slides profile the largest
  cohorts by customer count. Does not redefine cohorts.

slides:
  - slide: cohort_deck_title
  - slide: cohort_summary
  - slide: cohort_findings
  - slide: cohort_profiles
  - slide: data_quality
