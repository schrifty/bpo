id: support-kpis
name: Support KPIs
audience: Support / Engineering Leadership

purpose: |
  HELP operational KPI deck: intake, flow, backlog aging, tail risk, SLA adherence,
  TTFR, resolution time by type, LEAN/CUSTOMER jira_escalated flow, customer health, sentiment
  (supplementary), and tickets beyond first-response / resolution service thresholds.
  Scoped to the HELP Jira project (JSM Organizations for per-customer runs).
  Single-customer runs omit the account name in slide titles (cover + corner badge).

