id: cursor_cost
type: standard
order: 84
title: Cursor AI Coding Spend
slide_type: cursor_cost
data_tools: []
customers: all

prompt: >
  AI coding-assistant (Cursor) cost slide for the engineering portfolio deck, aimed at a
  VP of Engineering. Four KPI cards cover org-wide 30-day run rate, cost per active engineer,
  active engineer count, and total included usage this billing cycle. A full-width cost-over-time
  combo chart shows daily usage-based cost in dollars (bars) with active users (line) so reviewers
  can see whether spend is growing and tracks with adoption. Spend-by-model detail lives on the
  companion Cursor AI Spend by Model slide. Data comes from the Cursor Team Admin API; omitted
  when no CURSOR_ADMIN_API_KEY is configured.
