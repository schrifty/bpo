id: cursor_usage
type: standard
order: 86
title: Cursor AI Token Usage
slide_type: cursor_usage
data_tools: []
customers: all

prompt: >
  AI coding-assistant (Cursor) token-usage slide for engineering squads in the
  engineering portfolio deck, aimed at a VP of Engineering. Scope is Dev - *
  Atlassian engineering teams only (same cohort as AI Coding Spend). Bottom-line
  subtitle states total tokens over the recent window, the input/output workload
  ratio, and how many engineers are active. Four KPI cards cover total tokens,
  input tokens, output tokens, and request count. A tokens-over-time stacked bar
  chart shows daily input and output tokens; a model-usage-by-tokens mix shows
  which models carry the volume. Pairs with a separate non-engineering token-usage
  slide so org-wide Cursor volume is visible. Data comes from the Cursor Team Admin
  API joined to Atlassian Teams; omitted when CURSOR_ADMIN_API_KEY or
  ATLASSIAN_ORG_ID is not configured.
