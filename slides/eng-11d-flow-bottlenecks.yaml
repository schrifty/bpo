prompt: >
  Where work moves versus stalls for the LEAN engineering board. KPI cards show active WIP, items
  in review (the common chokepoint), items idle more than five days, and median
  cycle time with an up/down trend arrow. A median-cycle-time-by-week chart sits
  beside a table of the most-stalled active items (key, status, days idle, age).
  Single question: where does work get stuck and is delivery slowing down?
