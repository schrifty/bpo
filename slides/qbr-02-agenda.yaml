# =============================================================================
# QBR template slide definitions — shared guide (same intro on every QBR slides/*.yaml)
# =============================================================================
#
# What this is
# ------------
# Each file here describes one slide in the QBR Google Slides template: how the
# app should find that slide after the deck is copied, fill placeholders, and
# keep text fitting the layout. Your day-to-day edits are usually under `hydrate`
# below.
#
# Who edits it
# ------------
# Customer Success and anyone tuning QBR content. You can fix wording, layout
# guidance, and template behavior here without opening the codebase. If you are
# unsure about a change (especially renaming ids or adding new slide types), ask
# engineering first.
#
# Adding or removing slides from the QBR deck
# -------------------------------------------
# The deck’s order and which slides appear are controlled in decks/qbr.yaml,
# not in this file. Open that file and add or remove lines under `slides:`.
# Each entry points at a slide `id` that must match a file in slides/ (for
# example `slide: qbr_agenda` matches this file’s id). To add a brand-new slide
# type you need both: a new slides/*.yaml definition and a line in decks/qbr.yaml.
# Section titles on divider slides can be set right in decks/qbr.yaml next to
# each `qbr_divider` entry.
#
# How the template deck is filled
# --------------------------------
# QBR starts from your team’s Slides template. After copy, the app finds each
# slide, merges live data and section names where needed, and runs text cleanup
# (“adapt”) so placeholders become customer-ready copy. The `hydrate` section
# below controls how that works for this slide—detection, merge rules, and any
# extra wording or length guidance you add.
#
# True “shrink text to fit the shape” (Slides UI) cannot be set by this app — the
# Google Slides API only allows turning autofit off, not enabling TEXT_AUTOFIT. After
# hydrate, the app sets **autofit → NONE** on shapes that still match Title #N slots
# (see code) so Slides is less likely to reflow/wrap in those title bars. For more
# control, edit the **QBR master template** (box width, Shrink text on overflow, etc.).
#
# Optional: Google Drive
# ----------------------
# Your org may keep copies of these YAML files in Drive so edits sync without a
# git checkout. If something you changed in Drive doesn’t show up, fall back to
# the copy in the repo or ask engineering—rules vary by setup.
#
# =============================================================================
# This file — Agenda slide (qbr_agenda)
# =============================================================================
#
# What this slide does
# --------------------
# The agenda lists the sections of this QBR in order (from the deck plan). The
# app finds the slide that looks like the agenda (e.g. “Agenda” plus “Title #1”
# placeholders) and fills in real section names from the plan.
#
# What to change when…
# --------------------
# • Text overlaps, `…` mid-word, or titles too short — raise `section_titles.max_chars_per_section_title`
#   (merge budget) and/or shorten names in decks/qbr.yaml; enable **Shrink text** on the template boxes
#   (see “How the template deck is filled”). For other slides, see `adapt_layout_rule` in
#   `config/adapt_template_slide.yaml`.
# • The wrong slide is treated as the agenda — adjust `hydrate.template.slide_detection`
#   so it matches your template’s wording (e.g. add a phrase the slide contains).
# • You want cheaper/faster runs — under `visual_refinement`, turn `enabled` off
#   to skip extra review passes (layout issues may slip through).
# • The `prompt` field below is secondary; most fixes belong in `hydrate`.
#
# Don’t change the `id` field unless engineering renames it everywhere.
#
# =============================================================================

id: qbr_agenda
type: qbr
order: 2
title: Agenda
slide_type: qbr_agenda
data_tools: []
customers: all

prompt: |
  Numbered agenda slide auto-generated from the deck's slide plan.
  Dark navy background with accent panel. Numbers in mint, items in white.

# -----------------------------------------------------------------------------
# Hydrate — how this slide is found and filled in the copied template
# -----------------------------------------------------------------------------
hydrate:
  template:
    # Rules for the “adapt” step on this slide only (wording, length, layout).
    adapt_instructions: |
      QBR AGENDA SLIDE (this slide only). Prefer readable section names; the template should use “Shrink text
      on overflow” on Title #N boxes (set in Slides, not via this YAML).

      • Section titles (Title #N lines): merge budget = max_chars_per_section_title below. The app truncates
        beyond that with an ellipsis—raise the number if names look chopped; lower only if boxes are still too wide.
      • Description lines under a section title: **at most 45 characters** per line; end with … if you cut.
      • Prefer one line per agenda title row; avoid manual line breaks in Title #N boxes.
      • If copy still doesn’t fit after template “Shrink text”, shorten the deck section title in decks/qbr.yaml.

    # Optional extra pass that checks a thumbnail and may re-run adapt (uses more API time when on).
    visual_refinement:
      enabled: true
      max_refinements: 2

    # Merge deck section names into placeholder lines like “Title #1”, “Title #2”, …
    section_titles:
      from_deck_plan: true
      # Optional: shorten long section names before merge (none | acronym | first_word | first_two_words).
      # Vision ``layout_hints.shorten_mode`` can override for a post-hydrate pass.
      label_shortening:
        mode: none
      # Hard cap when merging deck section names into Title #N (ellipsis if longer). ~40 fits most labels; tune
      # with your template box width + “Shrink text on overflow” in the Slides master.
      max_chars_per_section_title: 42
      slot_labels: title_number_hash
      # Match how your template labels slots; default is “Title #1”, “Title #2”, …
      title_slot_regex: "\\bTitle\\s*#\\s*(\\d+)\\b"

    # How we know which slide in the copied deck is the agenda (any match wins).
    slide_detection:
      body_contains_word:
        - Agenda
      body_matches_regex: "Title\\s*#\\s*\\d+"
      # To use only the app’s older built-in guess, set slide_detection: null (not recommended).
