id: eng_epic_progress
type: standard
order: 86
title: Initiative Progress
slide_type: eng_epic_progress
data_tools: []
customers: all

prompt: >
  Initiative ("big rock") progress slide for the engineering portfolio deck. Shows
  the largest in-flight LEAN epics by size, with a completion bar (done vs. total
  child issues), the done/total counts and percent, epic status, and risk flags
  (overdue when a due date exists, or no-recent-update staleness). Epics with no
  remaining open work are excluded so catch-all/effectively-done epics do not crowd
  out the active initiatives. Gives a VP line of sight from day-to-day activity to
  whether the major initiatives are actually moving and where delivery risk sits.
