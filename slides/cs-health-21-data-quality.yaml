# CS Health Review — dedicated copy (decks/cs-health-review.yaml).
# slide_type matches the shared builder; id is deck-specific.

id: cs_health_data_quality
type: standard
order: 99
title: Data Governance
slide_type: data_quality
data_tools: []
customers: all

prompt: |
  Final slide in every deck. Data governance receipt for this run: which integrations
  fed the deck (source pills), scope and filters, freshness, deck-scoped lineage
  (JQL/SOQL/API paths where available), and known gaps (cross-source checks plus
  integration warnings). Salesforce is system of record for customer inventory; Pendo,
  Atlassian Jira/Teams, and Cursor enrich narrative. Always present — a clean bill of
  health is itself valuable information.
