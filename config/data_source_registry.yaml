# Integration metadata for deck Data Governance slides.
# Display names and env hints are stable; runtime status/lineage come from report["_governance"].

sources:
  pendo:
    display_name: Pendo
    authority: enrichment
    env_required: []
    env_optional: [PENDO_API_KEY, PENDO_SUBSCRIPTION_ID, CORTEX_PENDO_DISK_CACHE_TTL_HOURS]
    cache_ttl_env: CORTEX_PENDO_DISK_CACHE_TTL_HOURS
    default_cache_hours: 12
  cs_report:
    display_name: CS Report
    authority: enrichment
    env_required: []
    env_optional: [CSR_SHEET_ID]
  atlassian_jira:
    display_name: Atlassian Jira
    authority: enrichment
    aliases: [JIRA, Jira]
    env_required: [JIRA_URL, JIRA_API_TOKEN]
    env_optional: [JIRA_EMAIL, JIRA_CLOUD_ID, ATLASSIAN_ORG_ID, CORTEX_JIRA_CACHE_TTL_HOURS]
    cache_ttl_env: CORTEX_JIRA_CACHE_TTL_HOURS
    default_cache_hours: 20
  atlassian_teams:
    display_name: Atlassian Teams
    authority: enrichment
    used_for: [engineer_roster, cursor_audience_scope]
    env_required: [ATLASSIAN_ORG_ID]
    env_optional: [ATLASSIAN_API_KEY]
  salesforce:
    display_name: Salesforce
    authority: system_of_record
    env_required: []
    env_optional: [SF_CLIENT_ID, SF_USERNAME, CORTEX_SALESFORCE_CACHE_TTL_HOURS]
    cache_ttl_env: CORTEX_SALESFORCE_CACHE_TTL_HOURS
    default_cache_hours: 48
  cursor:
    display_name: Cursor
    authority: enrichment
    env_required: [CURSOR_ADMIN_API_KEY]
    env_optional: [CURSOR_API_BASE_URL, CORTEX_CURSOR_CACHE_TTL_HOURS]
    cache_ttl_env: CORTEX_CURSOR_CACHE_TTL_HOURS
    default_cache_hours: 1
    endpoints:
      - name: team_members
        method: GET
        path: /teams/members
      - name: filtered_usage_events
        method: POST
        path: /teams/filtered-usage-events
      - name: daily_usage_data
        method: GET
        path: /teams/daily-usage-data
      - name: team_spend
        method: GET
        path: /teams/spend
  github:
    display_name: GitHub
    authority: enrichment
    env_required: []
    env_optional: [GITHUB_TOKEN, GITHUB_ORG, GITHUB_REPOS, GITHUB_API_BASE_URL]
    cache_ttl_env: CORTEX_GITHUB_CACHE_TTL_HOURS
    default_cache_hours: 1
    endpoints:
      - name: org_repos
        method: GET
        path: /orgs/{org}/repos
      - name: commits
        method: GET
        path: /repos/{owner}/{repo}/commits
      - name: pulls
        method: GET
        path: /repos/{owner}/{repo}/pulls
      - name: contributor_stats
        method: GET
        path: /repos/{owner}/{repo}/stats/contributors
  slack:
    display_name: Slack
    authority: enrichment
    env_required: []
    env_optional: [SLACK_BOT_TOKEN, SLACK_API_BASE_URL, CORTEX_SLACK_CACHE_TTL_HOURS]
    cache_ttl_env: CORTEX_SLACK_CACHE_TTL_HOURS
    default_cache_hours: 23
  leandna:
    display_name: LeanDNA
    authority: enrichment
    env_required: []
    env_optional: [LEANDNA_API_BASE_URL, LEANDNA_API_KEY]

