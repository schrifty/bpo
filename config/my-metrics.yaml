# LeanDNA metric registry — config/my-metrics.yaml
#
# Keys are LeanDNA metric display names (owner: marc.schriftman@leandna.com, siteId 416).
# Populated from metrics-get-mine (Data API GET /data/identity + /data/Metric).
#
# Fields:
#   metric-id         — Data API catalog id (same as app ndx); required before upsert unless
#                       already present in GET /data/Metric (create metrics in LeanDNA UI)
#   metric-generator  — Python function that computes the daily value when wired in BPO;
#                       null when no generator exists in this repo yet
#
# Generator names refer to functions under src/ (e.g. jira_cycle_time.get_dev_team_cycle_times).

metrics:
