# LeanDNA metric registry — config/my-metrics.yaml
#
# Keys are LeanDNA metric display names (owner: marc.schriftman@leandna.com, siteId 416).
# Populated from metrics-get-mine (Data API GET /data/identity + /data/Metric).
#
# Fields:
#   description       — Human-readable summary of what the metric measures; filled in for
#                       entries with a generator, null when not yet defined
#   metric-id         — Data API catalog id (same as app ndx); required before upsert unless
#                       already present in GET /data/Metric (create metrics in LeanDNA UI)
#   metric-generator  — Python function that computes the daily value when wired in BPO;
#                       null when no generator exists in this repo yet
#
# Generator names refer to functions under src/ (e.g. jira_cycle_time.get_dev_team_cycle_times).

metrics:
  # Control Tower
  "Time to Value":
    description: null
    metric-id: 1860
    metric-generator: null

  # On-Time Performance
  "On Time Performance":
    description: null
    metric-id: 1745
    metric-generator: null

  # Customer-Reported Bugs
  "Customer-Reported Bugs":
    description: null
    metric-id: 2035
    metric-generator: null

  # Tickets Beyond Service Thresholds
  "Tickets Beyond Service Thresholds":
    description: >-
      Count of open HELP (JSM) tickets at high priority (Critical, Blocker, or
      Major) that are not yet resolved, excluding operational noise labelled
      Outage or healthcheck. Computed from a Jira JQL count by
      get_service_threshold_tickets.
    metric-id: 2028
    metric-generator: get_service_threshold_tickets

  # Site Uptime %
  "Site Uptime %":
    description: null
    metric-id: 1769
    metric-generator: null

  # AI Token Usage
  "AI Token Usage":
    description: >-
      Total AI tokens (input + output) consumed by the team's Cursor usage over a
      trailing 30-day window, summed from Cursor Admin API usage events by
      get_ai_token_usage.
    metric-id: null
    metric-generator: get_ai_token_usage

  # Median Time to Complete SUT (Weeks)
  "Median Time to Complete SUT (Weeks)":
    description: null
    metric-id: 2175
    metric-generator: null

  # Sprint Delivery % - AUTOMATABLE
  "Sprint Delivery %":
    description: null
    metric-id: 2086
    metric-generator: null

  # TTFR (30 Days) - AUTOMATABLE
  "TTFR (30 Days)":
    description: null
    metric-id: null
    metric-generator: null

  # SLA Adherence (30 Days) - AUTOMATABLE
  "SLA Adherence (30 Days)":
    description: null
    metric-id: null
    metric-generator: null

  "Engineering Cycle Time (Sprint)":
    description: >-
      Median active in-progress cycle time across development boards, in days —
      time issues spend in working statuses (e.g. In Progress, In Review), not
      counting backlog wait. Computed from Jira changelogs by get_dev_team_cycle_times.
    metric-id: 2024
    metric-generator: get_dev_team_cycle_times

  "Engineering Lead Time (Days)":
    description: >-
      Median lead time across development boards, in days — calendar time from
      issue created to resolved. Reported as the median of each board's median
      lead time by get_dev_team_lead_time.
    metric-id: 2179
    metric-generator: get_dev_team_lead_time

  # Data Sync Failures (Month) - 2029
  "Data Sync Failures (Month)":
    description: null
    metric-id: null
    metric-generator: null

  # Data Sync Failures (YTD) - 2031
  "Data Sync Failures (YTD)":
    description: null
    metric-id: null
    metric-generator: null

  # 2076
  "KPI Automation %":
    description: >-
      Count of fully-defined metrics in this registry (those having both a
      metric-id and a metric-generator), produced by get_kpi_automation_pct as
      the KPI automation numerator.
    metric-id: null
    metric-generator: get_kpi_automation_pct

  # 2077
  "QBR Automation %":
    description: null
    metric-id: null
    metric-generator: null

  # 2085
  "Team Performance (Onshore vs. Offshore)":
    description: null
    metric-id: null
