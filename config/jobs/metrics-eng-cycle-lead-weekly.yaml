name: metrics-eng-cycle-lead-weekly
stop_on_failure: true
fail_on_warnings: false
steps:
  - name: engineering-cycle-time-2024
    command: metrics-upsert
    metric: Engineering Cycle Time (Sprint)
    days: 30
  - name: engineering-lead-time-2179
    command: metrics-upsert
    metric: Engineering Lead Time (Days)
    days: 30
  - name: service-threshold-tickets-2028
    command: metrics-upsert
    metric: Tickets Beyond Service Thresholds
  - name: customer-reported-bugs-2035
    command: metrics-upsert
    metric: Customer-Reported Bugs
