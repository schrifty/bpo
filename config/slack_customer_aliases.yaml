# Cortex list alias map — config/slack_customer_aliases.yaml
# Schema: { "<customer_key>": [ "<channel name fragment>", ... ] }  (keys case-insensitive)
# Used by: Slack channel matching (substring + word boundaries). See CONFIG_ALIASES.md.
#
# Seeded 2026-07-08 from live conversations.list (100 unique public channels visible to the bot).
# Keys use csr_lookup_name (Pendo prefix when mapped) plus common Salesforce ultimate-parent labels.
#
# Top-10 ARR pilot coverage from public inventory:
#   Johnson Controls (lookup JCI) — johnson-controls
#   Spirit — spirit, spirit-data-load, spirit-implementation
#   Bombardier — bombardier-migration, bombardier_abm
# No public *ford*, *safran*, *carrier*, *modine*, *daikin*, *ge*, or *mercury* channels in inventory;
# those customers likely use private channels or names the bot cannot see until invited.

