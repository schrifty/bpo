# Manufacturing cohort classification for LeanDNA customer benchmarking.
# Each customer key matches the first-word prefix used in Pendo site names.
#
# Fields:
#   name        – full company name
#   cohort      – primary manufacturing cohort
#   sub_cohort  – optional finer grouping within the cohort
#   size        – account tier: enterprise (500+), mid (100-499), smb (<100)
#   parent      – parent company (if a subsidiary with its own Pendo prefix)
#   aliases     – other Pendo prefixes that map to the same company
#   notes       – any useful context
#   exclude     – true if this is a test/internal/duplicate account
#   unverified  – true if classification needs confirmation (resolve via Salesforce)

# ── Cohort definitions ──
# aerospace_defense     Airframe, aerostructures, engines, avionics, defense electronics, MRO
# hvac_building         HVAC, refrigeration, fire/safety, building controls, lighting
# vehicles              Automotive OEM/Tier-1, specialty/commercial vehicles, heavy equipment
# medical_devices       Medical device OEMs and contract manufacturers
# industrial_equipment  Pumps, valves, automation, material handling, process equipment
# electronics           Connectors, cable, semiconductors, photonics, test equipment
# advanced_materials    Specialty materials, ceramics, thermal, insulation, energy storage

